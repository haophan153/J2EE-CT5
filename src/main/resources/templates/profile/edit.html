<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa thông tin - EcoSwap</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <a th:href="@{/}" class="logo">
                <span>♻️</span> Eco<span>Swap</span>
            </a>
            <ul class="nav-links">
                <li><a th:href="@{/}">Trang chủ</a></li>
                <li><a th:href="@{/products}">Sản phẩm</a></li>
                <li><a th:href="@{/categories}">Danh mục</a></li>
            </ul>
            <div class="nav-actions">
                <form th:action="@{/search}" method="get" class="search-form">
                    <input type="text" name="keyword" placeholder="Tìm kiếm sản phẩm..." class="search-input">
                    <button type="submit" class="btn btn-primary">Tìm</button>
                </form>
                <div sec:authorize="isAuthenticated()" class="user-menu">
                    <a th:href="@{/profile}" class="user-info">
                        <span class="user-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
                        <span class="user-name" th:text="${#authentication.name}">Username</span>
                    </a>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-outline">Đăng xuất</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="form-container" style="max-width: 600px;">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--secondary-color);">
                Chỉnh sửa thông tin cá nhân
            </h2>
            
            <form th:action="@{/profile/update}" th:object="${user}" method="post">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" th:field="*{username}" readonly 
                           style="background: #f5f5f5; cursor: not-allowed;">
                    <small style="color: var(--text-light);">Tên đăng nhập không thể thay đổi</small>
                </div>
                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" th:field="*{fullName}" placeholder="Nhập họ và tên">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="Nhập email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="text" id="phone" th:field="*{phone}" placeholder="Nhập số điện thoại">
                </div>
                <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" id="address" th:field="*{address}" placeholder="Nhập địa chỉ">
                </div>
                <div class="form-group">
                    <label for="newPassword">Mật khẩu mới (để trống nếu không đổi)</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <a th:href="@{/profile}" class="btn btn-outline">Hủy</a>
                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Về EcoSwap</h3>
                <p>Nền tảng mua bán và trao đổi đồ cũ uy tín.</p>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 EcoSwap. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
